<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>GullyModelsShop</title><style>body{font-family:Arial;background:#f5f5f5;margin:0}header,footer{background:#111;color:#fff;text-align:center;padding:18px}.container{max-width:1000px;margin:auto;padding:20px}.upload{background:#fff;padding:15px;border-radius:8px}input,textarea{width:100%;margin:8px 0;padding:8px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:20px}.card{background:#fff;border-radius:8px;overflow:hidden}.card img{width:100%;height:220px;object-fit:cover}.c{padding:10px}button{padding:10px 14px}</style></head><body><header><h1>GullyModelsShop</h1></header><div class='container'><div class='upload'><input id='n' placeholder='Product Name'><input id='p' type='number' placeholder='Price'><textarea id='d' placeholder='Description'></textarea><input id='i' type='file' accept='image/*'><button onclick='add()'>Upload Product</button></div><div id='g' class='grid'></div></div><footer>©2026 GullyModelsShop</footer><script>function add(){let n=v('n'),p=v('p'),d=v('d'),f=document.getElementById('i').files[0];if(!n||!p||!f){alert('Fill all fields');return;}let r=new FileReader();r.onload=e=>{g.innerHTML+=`<div class=card><img src='${e.target.result}'><div class=c><h3>${n}</h3><p>${d}</p><b>₹${p}</b><br><button>Buy Now</button></div></div>`;['n','p','d','i'].forEach(id=>document.getElementById(id).value='')};r.readAsDataURL(f)}function v(id){return document.getElementById(id).value}const g=document.getElementById('g');</script></body></html>
